<!DOCTYPE html>  <!-- Comentário ou CTRL + : Informa ao navegador que é um documento HTML5 -->
<html lang="pt-BR"> <!-- Atributo lang define o idioma do conteúdo da página e marca o início do documento -->
<head> <!-- Cabeçalho da página. Aqui fica as configurações do documento  e informações  que não aparecem no corpo da página -->
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres do documento, garantindo que os caracteres sejam exibidos corretamente -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Configura a viewport para garantir que a página seja responsiva em dispositivos móveis e computadores -->
    <title>Document</title> <!-- Define o título da página, que aparece na aba do navegador e nos resultados de busca -->
</head> <!-- Fecha a tag head -->
<body> <!-- Corpo da página. Aqui fica o conteúdo visível da página -->
    <h1>Olá, Mundo!</h1> <!-- Título principal da página, exibido em destaque -->
    <h2>Site para estudo do módulo de HTML</h2> <!-- Título secundário da página -->
    <p>Este é o meu primeiro documento HTML.</p> <!-- Parágrafo de texto, exibido abaixo do título -->
    <ul> <!-- Lista não ordenada, usada para criar uma lista de itens -->
        <li>HTML</li> <!-- Item da lista -->
        <li>CSS</li> <!-- Item da lista -->
        <li>JavaScript</li> <!-- Item da lista -->
    </ul> <!-- Fecha a tag ul -->

</body> <!-- Fecha a tag body -->
</html>
